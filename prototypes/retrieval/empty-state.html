<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drey — Retrieval (Empty State)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --color-accent:     #8B5E5E;
  --color-background: #F7F4F4;
  --color-ink:        #1C1818;
  --color-muted:      #7A6E6E;
  --color-surface:    #F0ECEC;
  --font-body:        'Lora', serif;
  --font-ui:          'Inter', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  background: var(--color-background);
  color: var(--color-ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.app {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
  padding: 0 1.5rem;
}
.header {
  padding-top: 2rem;
  padding-bottom: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--color-muted);
  letter-spacing: 0.02em;
}
.header nav { display: flex; gap: 1.25rem; }
.header nav a { font-size: 0.8125rem; color: var(--color-muted); text-decoration: none; }
.header nav a:hover { color: var(--color-ink); }
.retrieval {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-bottom: 4rem;
}
.retrieval-input-wrapper { position: relative; }
.retrieval-input {
  width: 100%;
  font-family: var(--font-body);
  font-size: 1.25rem;
  color: var(--color-ink);
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--color-muted);
  padding: 0.75rem 0;
  outline: none;
  transition: border-color 0.15s;
}
.retrieval-input::placeholder { color: var(--color-muted); opacity: 0.6; }
.retrieval-input:focus { border-color: var(--color-accent); }
.retrieval-hint {
  margin-top: 0.75rem;
  font-size: 0.8125rem;
  color: var(--color-muted);
}
.retrieval-empty {
  margin-top: 3rem;
  text-align: center;
}
.retrieval-empty p {
  font-family: var(--font-body);
  font-size: 1rem;
  color: var(--color-muted);
  font-style: italic;
}
.footer {
  padding: 1.5rem 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--color-surface);
}
.footer a { font-size: 0.8125rem; color: var(--color-muted); text-decoration: none; }
.footer a:hover { color: var(--color-ink); }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>Drey</h1>
    <nav><a href="finished-area.html">Finished</a></nav>
  </header>

  <main class="retrieval">
    <div class="retrieval-input-wrapper">
      <input
        type="text"
        class="retrieval-input"
        placeholder="What fits right now?"
        aria-label="Search projects by appetite or keyword"
      >
      <p class="retrieval-hint">Try: low energy, busy hands, focused, social</p>
    </div>
    <div class="retrieval-empty">
      <p>The space is open.</p>
    </div>
  </main>

  <footer class="footer">
    <a href="#">+ New project</a>
    <a href="#">Export</a>
  </footer>
</div>
</body>
</html>
