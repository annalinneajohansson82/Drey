<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drey — Finished Area</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --color-accent:     #8B5E5E;
  --color-background: #F7F4F4;
  --color-ink:        #1C1818;
  --color-muted:      #7A6E6E;
  --color-surface:    #F0ECEC;
  --font-body:        'Lora', serif;
  --font-ui:          'Inter', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  background: var(--color-background);
  color: var(--color-ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.app {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
  padding: 0 1.5rem;
}
.header {
  padding-top: 2rem;
  padding-bottom: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--color-muted);
  letter-spacing: 0.02em;
}
.header nav { display: flex; gap: 1.25rem; }
.header nav a { font-size: 0.8125rem; color: var(--color-muted); text-decoration: none; }
.header nav a:hover { color: var(--color-ink); }
.back-link {
  font-size: 0.8125rem;
  color: var(--color-muted);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.375rem;
  margin-bottom: 0.5rem;
}
.back-link:hover { color: var(--color-ink); }
.finished-label {
  font-size: 0.75rem;
  color: var(--color-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 1.5rem;
}
.finished-list { flex: 1; }
.finished-item {
  display: block;
  padding: 1.25rem 0.5rem;
  border-bottom: 1px solid var(--color-surface);
  cursor: pointer;
  border-radius: 4px;
  margin: 0 -0.5rem;
  transition: background 0.15s;
  text-decoration: none;
}
.finished-item:hover { background: var(--color-surface); }
.finished-handle {
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 400;
  color: var(--color-muted);
  line-height: 1.4;
}
.footer {
  padding: 1.5rem 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--color-surface);
}
.footer a { font-size: 0.8125rem; color: var(--color-muted); text-decoration: none; }
.footer a:hover { color: var(--color-ink); }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>Drey</h1>
    <nav><a href="empty-state.html">Back</a></nav>
  </header>

  <a href="empty-state.html" class="back-link">&larr; Back</a>
  <p class="finished-label">Finished</p>

  <main class="finished-list">
    <a href="item-detail.html" class="finished-item">
      <h2 class="finished-handle">Set up the home server</h2>
    </a>
    <a href="item-detail.html" class="finished-item">
      <h2 class="finished-handle">Read "Designing for ADHD" by Sarah Kim</h2>
    </a>
    <a href="item-detail.html" class="finished-item">
      <h2 class="finished-handle">Build the garden raised bed</h2>
    </a>
    <a href="item-detail.html" class="finished-item">
      <h2 class="finished-handle">Write the project retrospective for Q4</h2>
    </a>
  </main>

  <footer class="footer">
    <a href="#">+ New project</a>
    <a href="#">Export</a>
  </footer>
</div>
</body>
</html>
